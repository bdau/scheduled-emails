name = "scheduled-emails-proxy"
main = "src/worker.js"
compatibility_date = "2026-07-01"

[vars]
GITHUB_OWNER = "bdau"
GITHUB_REPO  = "scheduled-emails"
# The ref the proxy serves. Use a tag (e.g. "v1") as an explicit publish gate,
# or "main" for latest-always. Create the tag before switching REF to it.
REF = "main"

# Secrets are NOT set here. Set them once with:
#   wrangler secret put GITHUB_TOKEN     # fine-grained PAT, Contents: read, this repo only
#   wrangler secret put ACCESS_SECRET    # long random string, e.g. `openssl rand -hex 24`

# Optional custom domain instead of the *.workers.dev URL:
# [[routes]]
# pattern = "emails.dunn.fm/*"
# custom_domain = true
