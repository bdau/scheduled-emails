# <email-name> - delivery + shell config. Copy this folder to emails/<email-name>/ to start a new email.
name: <email-name>
title: <Masthead title>            # {{EMAIL_TITLE}} (page title + masthead)
brand: <Brand / kicker line>       # {{BRAND}}
subject: <Email subject line>

# Delivery (read by shared/send.md)
from: claude@updates.dunn.fm
to: ben@dunn.fm
# audience_id:                     # set this instead of `to` to send to a Resend audience

# Cadence (mirror of the scheduled task; source of truth is the scheduled task itself)
schedule: "0 7 * * 1"             # example: 07:00 every Monday

# Content parameters (add whatever this email's brief reads)
lookback_hours: 168
footer_text: >-
  Generated by your personal assistant agent. Not investment advice.
